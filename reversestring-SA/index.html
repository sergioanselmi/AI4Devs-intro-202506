<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reverse String</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    /* ─── Variables ─────────────────────────────────────── */
    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --border:    #1e1e2e;
      --accent:    #e8ff47;
      --accent2:   #ff6b47;
      --text:      #f0f0f8;
      --muted:     #5a5a7a;
      --radius:    16px;
      --mono:      'DM Mono', monospace;
      --display:   'Syne', sans-serif;
    }

    /* ─── Reset & Base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
      position: relative;
    }

    /* ─── Background grid + glow ────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(232,255,71,0.07) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Card ──────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2.5rem 2rem;
      box-shadow: 0 0 0 1px rgba(232,255,71,.06),
                  0 32px 80px rgba(0,0,0,.7);
    }

    /* ─── Header ────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: rgba(232,255,71,.1);
      border: 1px solid rgba(232,255,71,.25);
      color: var(--accent);
      font-family: var(--mono);
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .35rem .75rem;
      border-radius: 99px;
      margin-bottom: 1.25rem;
    }
    .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity:.3; }
    }

    h1 {
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.1;
      margin-bottom: .5rem;
    }

    h1 span {
      color: var(--accent);
      position: relative;
    }
    h1 span::after {
      content: '';
      position: absolute;
      left: 0; bottom: 2px;
      width: 100%; height: 3px;
      background: var(--accent);
      border-radius: 2px;
      opacity: .4;
    }

    .subtitle {
      font-family: var(--mono);
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* ─── Input ─────────────────────────────────────────── */
    .input-wrap {
      position: relative;
      margin-bottom: 1rem;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      background: rgba(255,255,255,.03);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 1rem;
      padding: 1rem 1.1rem;
      resize: vertical;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
      caret-color: var(--accent);
    }
    textarea::placeholder { color: var(--muted); }
    textarea:focus {
      border-color: rgba(232,255,71,.5);
      box-shadow: 0 0 0 3px rgba(232,255,71,.08);
    }

    /* shake animation */
    @keyframes shake {
      0%,100%  { transform: translateX(0); }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }
    textarea.shake { animation: shake .4s ease; border-color: var(--accent2) !important; }

    .char-count {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      text-align: right;
      margin-top: .4rem;
    }

    /* ─── Buttons ───────────────────────────────────────── */
    .actions {
      display: flex;
      gap: .75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    button {
      font-family: var(--display);
      font-weight: 700;
      border: none;
      cursor: pointer;
      border-radius: 12px;
      transition: transform .15s, box-shadow .15s, background .2s, opacity .2s;
    }
    button:active { transform: scale(.96); }

    .btn-primary {
      flex: 1;
      padding: .85rem 1.5rem;
      background: var(--accent);
      color: #0a0a0f;
      font-size: 1rem;
      letter-spacing: .01em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      box-shadow: 0 4px 20px rgba(232,255,71,.25);
      position: relative;
      overflow: hidden;
    }
    .btn-primary:not(:disabled):hover {
      box-shadow: 0 6px 30px rgba(232,255,71,.45);
      transform: translateY(-2px);
    }

    /* ── Disabled state ── */
    .btn-primary:disabled {
      background: rgba(255,255,255,.06);
      color: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
      border: 1.5px solid var(--border);
    }
    .btn-primary:disabled:active { transform: none; }

    /* ── Unlock flash when first enabled ── */
    @keyframes unlock-flash {
      0%   { box-shadow: 0 0 0 0 rgba(232,255,71,.7); background: #fff; }
      40%  { box-shadow: 0 0 0 18px rgba(232,255,71,0); background: var(--accent); }
      100% { box-shadow: 0 4px 20px rgba(232,255,71,.25); }
    }
    .btn-primary.just-unlocked {
      animation: unlock-flash .5s cubic-bezier(.22,1,.36,1) forwards;
    }

    /* ── Confirm pulse ── */
    .btn-primary.pulse {
      animation: pulse-btn .55s ease;
    }
    @keyframes pulse-btn {
      0%   { box-shadow: 0 0 0 0 rgba(232,255,71,.7); }
      70%  { box-shadow: 0 0 0 18px rgba(232,255,71,0); }
      100% { box-shadow: 0 4px 20px rgba(232,255,71,.25); }
    }

    /* ── Pip dots inside button ── */
    .btn-pips {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .pip {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      border: 1.5px solid rgba(255,255,255,.15);
      transition: background .2s, transform .2s, box-shadow .2s;
    }
    .pip.filled {
      background: var(--accent2);
      border-color: transparent;
      transform: scale(1.25);
      box-shadow: 0 0 6px var(--accent2);
    }
    /* When button is enabled, pips are hidden (label changes) */
    .btn-primary:not(:disabled) .btn-pips { display: none; }
    .btn-primary:disabled .btn-label-active { display: none; }
    .btn-primary:not(:disabled) .btn-label-disabled { display: none; }

    .btn-icon {
      width: 48px; height: 48px;
      background: rgba(255,255,255,.05);
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px;
    }
    .btn-icon:hover { color: var(--text); border-color: var(--muted); }
    .btn-icon.copied { color: var(--accent); border-color: var(--accent); }

    /* ─── Arrow divider ─────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      color: var(--muted);
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .1em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── Output ────────────────────────────────────────── */
    #outputSection {
      background: rgba(232,255,71,.04);
      border: 1.5px solid rgba(232,255,71,.15);
      border-radius: var(--radius);
      padding: 1.25rem 1.25rem 1rem;
      min-height: 80px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .35s ease, transform .35s ease;
      position: relative;
      overflow: hidden;
    }

    #outputSection::before {
      content: 'OUTPUT';
      position: absolute;
      top: .6rem; right: .9rem;
      font-family: var(--mono);
      font-size: .6rem;
      letter-spacing: .15em;
      color: var(--accent);
      opacity: .5;
    }

    #outputSection.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #outputText {
      font-family: var(--mono);
      font-size: 1.05rem;
      color: var(--accent);
      word-break: break-all;
      line-height: 1.6;
    }

    .placeholder-text { color: var(--muted); font-style: italic; }

    /* ─── Char drop animation ───────────────────────────── */
    @keyframes charDrop {
      from { opacity: 0; transform: translateY(-12px) scale(.85); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    .char-drop {
      display: inline-block;
      animation: charDrop .3s cubic-bezier(.22,1,.36,1) both;
    }

    /* ─── Toast ─────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: .8rem;
      padding: .6rem 1.2rem;
      border-radius: 99px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s, transform .3s;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Footer ────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      margin-top: 1.5rem;
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--muted);
    }

    /* ─── Responsive ────────────────────────────────────── */
    @media (max-width: 500px) {
      .card { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="badge">Utilidad de texto</div>

    <h1>Invertir <span>cadena</span></h1>
    <p class="subtitle">// Escribe un texto y obtén su inversión al instante</p>

    <div class="input-wrap">
      <textarea
        id="inputText"
        placeholder="Escribe tu texto aquí..."
        spellcheck="false"
        autocomplete="off"
      ></textarea>
    </div>
    <div class="char-count" id="charCount">0 caracteres</div>

    <div class="actions">
      <button class="btn-primary" id="reverseBtn" disabled>
        <!-- shown when disabled -->
        <span class="btn-pips">
          <span class="pip" id="pip1"></span>
          <span class="pip" id="pip2"></span>
          <span class="pip" id="pip3"></span>
        </span>
        <span class="btn-label-disabled">Escribe al menos 4 caracteres</span>
        <!-- shown when enabled -->
        <span class="btn-label-active">✓ Confirmar resultado</span>
      </button>
      <button class="btn-icon" id="copyBtn" title="Copiar resultado">⎘</button>
      <button class="btn-icon" id="clearBtn" title="Limpiar">✕</button>
    </div>

    <div class="divider">resultado</div>

    <div id="outputSection">
      <div id="outputText"><span class="placeholder-text">El resultado aparecerá aquí</span></div>
    </div>
  </div>

  <footer>reverse-string v1.1 &nbsp;·&nbsp; actualización en tiempo real · Enter para confirmar</footer>

  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
